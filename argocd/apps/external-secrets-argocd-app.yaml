# Deploys the External Secrets Operator (controller + webhook +
# cert-controller + CRDs) via the official Helm chart. The
# ClusterSecretStore is a SEPARATE Application (later sync-wave) because
# it needs ESO's CRDs to exist first.
#
# Auth: Route to AWS Secrets Manager via EKS Pod Identity, bound to
# external-secrets/external-secrets by the association in
# modules/external-secrets. No serviceAccount role annotation.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"   # operator + CRDs before the store
spec:
  project: default

  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: "2.7.0"   # confirm latest 0.x: helm search repo external-secrets/external-secrets --versions
    helm:
      values: |
        # Install and keep CRDs (ClusterSecretStore, ExternalSecret, ...).
        installCRDs: true

        # Portfolio: 1 replica each. Prod would scale the controller.
        replicaCount: 1

        serviceAccount:
          create: true
          name: external-secrets
          # no eks.amazonaws.com/role-arn — Pod Identity supplies creds

        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            memory: 128Mi

        webhook:
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 64Mi

        certController:
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 64Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true