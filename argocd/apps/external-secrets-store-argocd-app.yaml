# Applies the ClusterSecretStore. Separate from the ESO chart Application
# because it depends on ESO's CRDs (and webhook) existing first; the
# later sync-wave enforces that ordering.
#
# Assumes the manifest lives at argocd/manifests/external-secrets/.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-store
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"   # after external-secrets (wave -5)
spec:
  project: default

  source:
    repoURL: https://github.com/charliepoker/robot-shop-gitOps.git
    targetRevision: main
    path: argocd/manifests/external-secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m