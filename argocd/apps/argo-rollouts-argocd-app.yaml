# Progressive delivery controller. Installs the Rollout / AnalysisTemplate
# / Experiment CRDs and the controller that reconciles them.
#


# No IAM / Pod Identity needed: Argo Rollouts is a pure in-cluster
# controller and makes no AWS API calls of its own. (Traffic shifting
# on ALBs is done by mutating Ingress/target-group weights, which the
# AWS Load Balancer Controller then actions using ITS credentials.)

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-rollouts
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  project: default

  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-rollouts
    targetRevision: "2.41.0"   
    helm:
      values: |
        installCRDs: true

        controller:
          replicas: 1   # portfolio; prod runs 2 with leader election
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi

        dashboard:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: argo-rollouts

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # Rollout CRDs are large