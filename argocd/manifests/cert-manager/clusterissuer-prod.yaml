# robot-shop-gitOps/argocd/manifests/cert-manager/clusterissuer-prod.yaml
#
# Let's Encrypt PRODUCTION issuer. Issues browser-TRUSTED certs, but has
# strict rate limits (e.g. 50 certs/registered-domain/week). Only point
# workloads here after the staging issuer has proven the DNS-01 flow works.

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Production ACME endpoint — trusted CA, rate-limited.
    server: https://acme-v02.api.letsencrypt.org/directory
    email: iheanachocharlie@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          route53:
            region: us-east-1
            hostedZoneID: Z101693915HJHMDLM1SNS
        selector:
          dnsZones:
            - devopsportfolio.com