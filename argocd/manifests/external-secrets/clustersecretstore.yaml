# ClusterSecretStore = cluster-wide "where secrets come from + how to
# authenticate." Provider is AWS Secrets Manager. Auth is deliberately
# LEFT UNSPECIFIED: with no serviceAccountRef, ESO's AWS provider uses
# the controller pod's ambient credentials — which come from the EKS
# Pod Identity association bound to the external-secrets ServiceAccount.
# No IRSA annotation, no static keys.
#
# "Valid" status here means ESO successfully authenticated to Secrets
# Manager with these credentials
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      # No `auth:` block → ESO falls back to the controller pod's
      # ambient (Pod Identity) credentials. This is the Pod Identity
      # pattern for a ClusterSecretStore.